name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [module-1, module-2, module-3, module-4]
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Format
      run: cd content/${{ matrix.module }} && make format

    - name: Lint
      run: cd content/${{ matrix.module }} && make lint

    - name: Test
      run: cd content/${{ matrix.module }} && make test

    - name: Build
      run: cd content/${{ matrix.module }} && make build